<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naview Options</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; color: #1a1a1a; }
    h1 { font-size: 20px; margin-bottom: 24px; }
    label { display: block; font-size: 14px; margin-bottom: 8px; }
    select, button { padding: 8px 12px; border-radius: 8px; border: 1px solid #dadce0; font-size: 14px; }
    button { background: #1a73e8; color: #fff; border-color: #1a73e8; cursor: pointer; }
    button:hover { opacity: 0.85; }
    .section { margin-bottom: 28px; }
    .section h2 { font-size: 15px; margin-bottom: 12px; color: #444; }
    #status { margin-top: 8px; font-size: 13px; color: #1a73e8; }
    .toggle-row { display: flex; align-items: center; gap: 12px; }
    input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Naview Settings</h1>

  <div class="section">
    <h2>Auto-parse behavior</h2>
    <label for="autoParse">When visiting a Naviance scattergram page:</label>
    <select id="autoParse">
      <option value="always">Always auto-parse</option>
      <option value="ask">Ask me each time</option>
      <option value="never">Never (disable auto-parse)</option>
    </select>
  </div>

  <div class="section">
    <h2>Developer</h2>
    <div class="toggle-row">
      <input type="checkbox" id="captureMode">
      <label for="captureMode" style="margin:0;">Capture mode — save raw API responses as fixture files</label>
    </div>
  </div>

  <button id="save">Save</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
